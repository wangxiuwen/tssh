name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build binaries
        run: |
          make all
          
          # Rename output binaries to clearly show version in release assets
          VERSION=${GITHUB_REF#refs/tags/}
          for file in dist/*; do
            mv "$file" "${file}-${VERSION}"
          done

      - name: Upload Release Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
